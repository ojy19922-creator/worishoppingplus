<script>



// 다크모드 테스트

  document.addEventListener('DOMContentLoaded', function () {
    const toggle = document.getElementById('modeToggle');
    const darkCssList = document.querySelectorAll('link[data-theme="dark"]');

    if (!toggle || !darkCssList.length) return;

    const savedMode = localStorage.getItem('darkMode') === 'on';
    toggle.checked = savedMode;

    darkCssList.forEach(link => {
      link.disabled = !savedMode;
    });

    toggle.addEventListener('change', function () {
      const isDark = this.checked;

      darkCssList.forEach(link => {
        link.disabled = !isDark;
      });

      localStorage.setItem('darkMode', isDark ? 'on' : 'off');
    });
  });


</script>
